# ============================================================
# Configuration Nginx pour SPA Angular SIRH
# - SPA fallback (try_files)
# - Compression gzip
# - Cache headers (long pour les assets, no-cache pour index.html)
# - Headers de sécurité de base
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff2;

    # --- Headers de sécurité (de base, à durcir en prod) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Assets versionnés (Angular ajoute des hashes en mode production) ---
    # Cache long (1 an) car le hash dans le nom du fichier garantit l'invalidation
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- index.html : jamais mis en cache ---
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # --- SPA fallback : toute route inconnue renvoie index.html ---
    # Sans ça, F5 sur /employee/profile renvoie un 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Désactiver le log pour les checks de santé ---
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
