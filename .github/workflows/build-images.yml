name: Build & push Docker images

# =====================================================================
# Construit les 4 images Docker, les scanne avec Trivy, les pousse sur GHCR.
# Déclenché sur push develop/main et sur les tags v*.*.*.
# Aussi disponible manuellement (workflow_dispatch).
# =====================================================================

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false   # on ne veut pas perdre un build sur tag

permissions:
  contents: read
  packages: write   # nécessaire pour push GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/sirh

jobs:

  build:
    name: build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: frontend
            context: frontend/sirh-frontend
          - name: api-gateway
            context: backend/api-gateway
          - name: employee-service
            context: backend/employee-service
          - name: recruitment-service
            context: backend/recruitment-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Génère les tags : sha-<short>, <branch>, v<semver>, latest sur main
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          # multi-arch désactivé pour PFE (gain temps build, runners gratuits)
          platforms: linux/amd64

      - name: Trivy scan (HIGH+CRITICAL, fail on findings)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.image.name }}@${{ steps.push.outputs.digest }}
          severity: HIGH,CRITICAL
          format: table
          exit-code: '0'   # passe à '1' une fois le baseline CVE accepté
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db

      - name: Image summary
        run: |
          echo "### ${{ matrix.image.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags**:" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest**: \`${{ steps.push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
