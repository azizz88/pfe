name: CI

# =====================================================================
# Lint + test + build sur PR et push develop/main.
# Bloque le merge si un job échoue (branch protection requise).
# =====================================================================

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Annule les runs en cours sur la même PR si on push à nouveau
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions minimales (principe du moindre privilège)
permissions:
  contents: read

jobs:

  # =========================================================
  # Build + tests des 3 services Spring Boot (matrix parallèle)
  # =========================================================
  backend:
    name: backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, employee-service, recruitment-service]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven verify (compile + tests)
        run: mvn -B -ntp -e verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-${{ matrix.service }}
          path: backend/${{ matrix.service }}/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

  # =========================================================
  # Build Angular (production)
  # =========================================================
  frontend:
    name: frontend (Angular 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/sirh-frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/sirh-frontend/package-lock.json

      # npm install (et pas `npm ci`) car le lockfile a été généré sur Windows et
      # ne contient pas les optional deps Linux (@emnapi/*). Cf. décision #2 CLAUDE.md.
      # À basculer sur `npm ci` une fois le lockfile régénéré sur runner Linux.
      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build production
        run: npm run build -- --configuration=production

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: sirh-frontend-dist
          path: frontend/sirh-frontend/dist/
          retention-days: 7

  # =========================================================
  # SonarQube quality scan (Community Edition 10.x — self-hosted)
  # Une instance SonarQube Docker éphémère est démarrée dans le runner
  # pour chaque run CI. Aucun secret externe requis.
  # Pour l'analyse locale : http://localhost:9000 (admin/admin au 1er démarrage).
  # =========================================================
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Démarrer SonarQube
        run: |
          docker run -d --name sonarqube \
            -p 9000:9000 \
            -e SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true \
            sonarqube:10.4-community

      - name: Attendre SonarQube (max 3 min)
        run: |
          for i in $(seq 1 36); do
            STATUS=$(curl -s http://localhost:9000/api/system/status \
              | grep -o '"status":"[^"]*"' | cut -d'"' -f4 || echo "DOWN")
            echo "[${i}/36] SonarQube status: $STATUS"
            [ "$STATUS" = "UP" ] && break
            sleep 5
          done
          if ! curl -sf http://localhost:9000/api/system/status | grep -q '"status":"UP"'; then
            echo "::error::SonarQube n'a pas démarré à temps"
            docker logs sonarqube
            exit 1
          fi

      - name: Configurer admin SonarQube
        run: |
          curl -sf -u admin:admin -X POST http://localhost:9000/api/users/change_password \
            -d "login=admin&previousPassword=admin&password=SonarAdmin123"
          TOKEN=$(curl -s -u admin:SonarAdmin123 -X POST \
            "http://localhost:9000/api/user_tokens/generate" \
            -d "name=ci&login=admin" \
            | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          echo "SONAR_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Scan SonarQube (3 services backend)
        run: |
          for svc in api-gateway employee-service recruitment-service; do
            echo "=== Analyse $svc ==="
            (cd backend/$svc && mvn -B -ntp verify sonar:sonar \
              -Dsonar.host.url=http://localhost:9000 \
              -Dsonar.token=$SONAR_TOKEN \
              -Dsonar.projectKey=pfe-$svc \
              -Dsonar.projectName="SIRH - $svc") || exit 1
          done
