version: '3.8'

services:
  # ── Keycloak (serveur d'authentification) ──
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-theme/sirh-theme:/opt/keycloak/themes/sirh-theme

  # ── Mailhog (serveur SMTP dev — capture les emails sans les envoyer) ──
  # SMTP : mailhog:1025  |  UI web : http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  # ── PostgreSQL (base de données des microservices) ──
  postgres:
    image: postgres:16-alpine
    container_name: sirh-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sirh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── pgAdmin (UI web pour Postgres — http://localhost:5050) ──
  # Auto-enregistre le serveur "SIRH Docker" au démarrage (servers.json + pgpass).
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sirh-pgadmin
    user: root
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    entrypoint: >
      /bin/sh -c "
      cp /tmp/pgpass /var/lib/pgadmin/pgpass &&
      chmod 600 /var/lib/pgadmin/pgpass &&
      chown 5050:0 /var/lib/pgadmin/pgpass &&
      /entrypoint.sh
      "
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/tmp/pgpass:ro
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  keycloak_data:
  postgres_data:
  mysql_data:  # conservé pour rollback éventuel ; non utilisé par défaut
