# =====================================================================
# SIRH — orchestration complète (4 apps + Keycloak + Postgres + MailHog + pgAdmin)
# Variables d'environnement : voir .env (copier .env.example puis ajuster).
# =====================================================================

services:

  # =========================================================
  # Infrastructure (auth, DB, mail, admin DB)
  # =========================================================

  # ── Keycloak ──
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-theme/sirh-theme:/opt/keycloak/themes/sirh-theme
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    networks:
      - sirh-net

  # ── MailHog (capture SMTP en dev) ──
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - sirh-net

  # ── PostgreSQL (sirh_employees + sirh_recruitment) ──
  postgres:
    image: postgres:16-alpine
    container_name: sirh-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sirh}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sirh-net

  # ── pgAdmin (UI Postgres) ──
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sirh-pgadmin
    user: root
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    entrypoint: >
      /bin/sh -c "
      cp /tmp/pgpass /var/lib/pgadmin/pgpass &&
      chmod 600 /var/lib/pgadmin/pgpass &&
      chown 5050:0 /var/lib/pgadmin/pgpass &&
      /entrypoint.sh
      "
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/tmp/pgpass:ro
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sirh-net

  # =========================================================
  # Applications (backend + frontend)
  # =========================================================

  # ── employee-service (Spring Boot 3.2.5) ──
  employee-service:
    build:
      context: ./backend/employee-service
    image: sirh-employee-service:local
    container_name: sirh-employee-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      JWT_ISSUER_URI: ${JWT_ISSUER_URI:-http://localhost:8180/realms/aziz}
      JWT_JWK_SET_URI: ${JWT_JWK_SET_URI:-http://keycloak:8080/realms/aziz/protocol/openid-connect/certs}
    ports:
      - "8081:8081"
    volumes:
      - employee_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      mailhog:
        condition: service_started
    networks:
      - sirh-net

  # ── recruitment-service (Spring Boot 3.2.5 + Gemini) ──
  recruitment-service:
    build:
      context: ./backend/recruitment-service
    image: sirh-recruitment-service:local
    container_name: sirh-recruitment-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_ISSUER_URI: ${JWT_ISSUER_URI:-http://localhost:8180/realms/aziz}
      JWT_JWK_SET_URI: ${JWT_JWK_SET_URI:-http://keycloak:8080/realms/aziz/protocol/openid-connect/certs}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      mailhog:
        condition: service_started
    networks:
      - sirh-net

  # ── api-gateway (Spring Cloud Gateway 2023.0.1) ──
  api-gateway:
    build:
      context: ./backend/api-gateway
    image: sirh-api-gateway:local
    container_name: sirh-api-gateway
    environment:
      EMPLOYEE_SERVICE_URL: ${EMPLOYEE_SERVICE_URL:-http://employee-service:8081}
      RECRUITMENT_SERVICE_URL: ${RECRUITMENT_SERVICE_URL:-http://recruitment-service:8082}
      JWT_ISSUER_URI: ${JWT_ISSUER_URI:-http://localhost:8180/realms/aziz}
      JWT_JWK_SET_URI: ${JWT_JWK_SET_URI:-http://keycloak:8080/realms/aziz/protocol/openid-connect/certs}
    ports:
      - "8888:8888"
    depends_on:
      employee-service:
        condition: service_healthy
      recruitment-service:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - sirh-net

  # ── frontend (Angular 21 servi par Nginx 1.27) ──
  frontend:
    build:
      context: ./frontend/sirh-frontend
    image: sirh-frontend:local
    container_name: sirh-frontend
    ports:
      - "4200:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - sirh-net

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sirh-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - sirh-net
    restart: unless-stopped

  # ── Grafana ──
  grafana:
    image: grafana/grafana:11.0.0
    container_name: sirh-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/sirh-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - sirh-net
    restart: unless-stopped

# =====================================================================
# Réseau & volumes
# =====================================================================

networks:
  sirh-net:
    driver: bridge

volumes:
  keycloak_data:
  postgres_data:
  employee_uploads:
  prometheus_data:
  grafana_data:
