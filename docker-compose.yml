version: '3.8'

services:
  # ── Keycloak (serveur d'authentification) ──
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-theme/sirh-theme:/opt/keycloak/themes/sirh-theme

  # ── Mailhog (serveur SMTP dev — capture les emails sans les envoyer) ──
  # SMTP : mailhog:1025  |  UI web : http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  # ── MySQL (base de données des microservices) ──
  mysql:
    image: mysql:8.0
    container_name: sirh-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

volumes:
  keycloak_data:
  mysql_data:
