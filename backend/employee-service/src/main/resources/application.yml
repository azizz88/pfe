# ===================================================
# Employee-Service Configuration
# ===================================================
spring:
  application:
    name: employee-service

  # --- Upload de fichiers ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # --- Base de données MySQL ---
  datasource:
    url: jdbc:mysql://localhost:3306/sirh_employees?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # --- Keycloak / OAuth2 Resource Server ---
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/aziz

# Port du service
server:
  port: 8081

# --- Keycloak Admin Client (pour le flux mot de passe oublie) ---
# Le client "sirh-backend-admin" doit etre cree dans le realm "aziz" avec :
#   - Client authentication: ON
#   - Service accounts roles: ON
#   - Service account role: realm-management / manage-users + view-users
# Le secret se recupere dans Clients > sirh-backend-admin > Credentials.
keycloak:
  admin:
    server-url: http://localhost:8180
    realm: aziz
    client-id: sirh-backend-admin
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:uM3AAgCaOy7xib8ZwYRP0lan67k1MPWw}
  # Parametres du lien envoye dans l'email de reset password.
  # Le client-id doit correspondre au client frontal (Angular) et le redirect-uri
  # doit figurer dans ses Valid Redirect URIs.
  reset-password:
    client-id: angular-client
    redirect-uri: http://localhost:4200

# Répertoire d'upload des documents
app:
  upload:
    dir: ./uploads

---
# ===================================================
# Profil DEV (H2 en mémoire, sans MySQL)
# Lancer avec: --spring.profiles.active=dev
# ===================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:sirh_employees
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
