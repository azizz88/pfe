# ===================================================
# Employee-Service Configuration
# ===================================================
spring:
  application:
    name: employee-service

  # --- Upload de fichiers ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # --- Base de données PostgreSQL ---
  datasource:
    url: jdbc:postgresql://localhost:5432/sirh_employees
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # --- Keycloak / OAuth2 Resource Server ---
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/aziz

  # --- SMTP (Mailhog en dev — capture les emails sans les envoyer pour de vrai) ---
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Port du service
server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

# URL de recruitment-service (pour récupérer le catalogue Skill lors de l'extraction CV)
services:
  recruitment-service:
    url: http://localhost:8082

# --- Keycloak Admin Client (pour les flux de reset et activation) ---
# Authentification via le superuser admin/admin du realm "master" (client "admin-cli")
# → aucune configuration Keycloak nécessaire en plus de ce qui est créé par défaut.
# Le champ "realm" ci-dessous = realm CIBLE sur lequel les opérations s'appliquent.
keycloak:
  admin:
    server-url: http://localhost:8180
    realm: aziz
    auth-realm: master
    client-id: admin-cli
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
  
  # Parametres du lien envoye dans l'email de reset password (flux "mot de passe oublie").
  # Le client-id doit correspondre au client frontal (Angular) et le redirect-uri
  # doit figurer dans ses Valid Redirect URIs.
  reset-password:
    client-id: angular-client
    redirect-uri: http://localhost:4200
  
  # Parametres du lien envoye dans l'email d'activation (création d'employé).
  # L'employé reçoit un lien pour définir son mot de passe et activer son compte.
  # Si non configuré, utilise les mêmes paramètres que reset-password.
  activation:
    client-id: angular-client
    redirect-uri: http://localhost:4200

# --- Paramètres de l'application ---
app:
  # URL envoyée dans l'email de bienvenue (page de login Angular)
  login-url: http://localhost:4200
  mail:
    from: noreply@sirh.local
  # Répertoire d'upload des documents
  upload:
    dir: ./uploads

---
# ===================================================
# Profil DEV (H2 en mémoire, sans MySQL)
# Lancer avec: --spring.profiles.active=dev
# ===================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:sirh_employees
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
