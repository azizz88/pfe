# ===================================================
# API Gateway Configuration
# ===================================================
spring:
  application:
    name: api-gateway

  # --- Spring Cloud Gateway Routes ---
  cloud:
    gateway:
      routes:
        # ── Route publique : reset password (pas de TokenRelay) ──
        - id: auth-public
          uri: ${EMPLOYEE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        # ── Employee-Service ──
        - id: employee-service
          uri: ${EMPLOYEE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/employees/**
          filters:
            - TokenRelay=

        - id: department-service
          uri: ${EMPLOYEE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/departments/**
          filters:
            - TokenRelay=

        - id: contract-service
          uri: ${EMPLOYEE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/contracts/**
          filters:
            - TokenRelay=

        - id: document-service
          uri: ${EMPLOYEE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/documents/**
          filters:
            - TokenRelay=

        - id: cv-extraction-service
          uri: ${EMPLOYEE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/cv/**
          filters:
            - TokenRelay=

        - id: service-entity-service
          uri: ${EMPLOYEE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/services/**
          filters:
            - TokenRelay=

        # ── Recruitment-Service ──
        - id: job-offer-service
          uri: ${RECRUITMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/job-offers/**
          filters:
            - TokenRelay=

        - id: application-service
          uri: ${RECRUITMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/applications/**
          filters:
            - TokenRelay=

        - id: interview-service
          uri: ${RECRUITMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/interviews/**
          filters:
            - TokenRelay=

        - id: skill-service
          uri: ${RECRUITMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/skills/**
          filters:
            - TokenRelay=

        - id: matching-service
          uri: ${RECRUITMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/matching/**
          filters:
            - TokenRelay=

        - id: external-candidate-service
          uri: ${RECRUITMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/external-candidates/**
          filters:
            - TokenRelay=

        - id: training-provider-service
          uri: ${RECRUITMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/training-providers/**
          filters:
            - TokenRelay=

        - id: training-service
          uri: ${RECRUITMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/training/**
          filters:
            - TokenRelay=

  # --- Keycloak / OAuth2 Resource Server ---
  # issuer-uri = ce que le navigateur voit (port publié 8180)
  # jwk-set-uri = chemin interne (par défaut résolu depuis issuer-uri en /.well-known) ;
  #              en Docker on l'override pour pointer sur keycloak:8080 directement.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/aziz}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8180/realms/aziz/protocol/openid-connect/certs}

# Port de la Gateway
server:
  port: 8888

# Logging pour debug
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG

# Actuator (healthchecks Docker + monitoring Prometheus)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    git:
      mode: full
