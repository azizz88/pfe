# ===================================================
# Recruitment-Service Configuration
# ===================================================
spring:
  application:
    name: recruitment-service

  # --- Base de données PostgreSQL ---
  datasource:
    url: jdbc:postgresql://localhost:5432/sirh_recruitment
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # --- Keycloak / OAuth2 Resource Server ---
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/aziz

  # --- Mail (SMTP MailHog en dev) ---
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Port du service
server:
  port: 8082

# URL d'employee-service (appel cross-service pour le matching IA)
services:
  employee-service:
    url: http://localhost:8081

# Paramètres applicatifs (convocation d'entretien)
app:
  mail:
    from: noreply@sirh.local
  login-url: http://localhost:4200

# Configuration Google Gemini API (suggestion d'organismes de formation)
# Si la clé est vide, le service utilise un fallback set-overlap (score sur intersection de skills).
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.0-flash
  base-url: https://generativelanguage.googleapis.com/v1beta/models
  timeout-seconds: 20

# Actuator (healthchecks Docker + monitoring Prometheus)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    git:
      mode: full

---
# ===================================================
# Profil DEV (H2 en mémoire)
# ===================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:sirh_recruitment
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

---
# ===================================================
# Profil DOCKER (orchestration docker-compose)
# ===================================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/sirh_recruitment
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/aziz}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://keycloak:8080/realms/aziz/protocol/openid-connect/certs}

  mail:
    host: mailhog
    port: 1025

services:
  employee-service:
    url: http://employee-service:8081
