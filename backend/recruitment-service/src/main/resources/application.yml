# ===================================================
# Recruitment-Service Configuration
# ===================================================
spring:
  application:
    name: recruitment-service

  # --- Base de données MySQL ---
  datasource:
    url: jdbc:mysql://localhost:3306/sirh_recruitment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # --- Keycloak / OAuth2 Resource Server ---
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/aziz

# Port du service
server:
  port: 8082

---
# ===================================================
# Profil DEV (H2 en mémoire)
# ===================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:sirh_recruitment
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
